<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dadaboev App Expenses</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f2f2f2;padding:20px;transition:.3s}
.dark{background:#111;color:#fff}
.box{max-width:420px;margin:auto;background:#fff;padding:20px;border-radius:20px;box-shadow:0 0 15px gray}
.dark .box{background:#222}
h1{text-align:center;margin-bottom:15px}
input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #bbb;
font-size:16px;
}
button{
background:#16a34a;
color:#fff;
border:none;
cursor:pointer;
}
#darkBtn{
background:#333;
}
li{
list-style:none;
background:#eee;
margin-top:10px;
padding:10px;
border-radius:10px;
}
.dark li{
background:#333;
}
</style>

</head>
<body>

<div class="box">

<button id="darkBtn">🌙 Dark Mode</button>

<h1>💰 Dadaboev Hisoblagich</h1>
<input id="daromad" type="number" placeholder="Daromad">

<input id="kategoriya" placeholder="Kategoriya">

<input id="nom" placeholder="Xarajat nomi">

<input id="summa" type="number" placeholder="Xarajat summasi">

<input id="sana" type="date">

<select id="valyuta">
<option>🇺🇿 UZS</option>
<option>🇺🇸 USD</option>
<option>🇪🇺 EUR</option>
<option>🇷🇺 RUB</option>
</select>

<button onclick="qosh()">➕ Qo'shish</button>

<input id="qidiruv" placeholder="🔍 Qidirish" onkeyup="qidir()">

<h2 id="natija"></h2>

<h3 id="jami"></h3>

<ul id="royxat"></ul>

</div>

<script>

let xarajatlar=[];

function qosh(){

let nom=document.getElementById("nom").value;
let kategoriya=document.getElementById("kategoriya").value;
let summa=Number(document.getElementById("summa").value);
let sana=document.getElementById("sana").value;

if(nom==""||summa<=0){
alert("Ma'lumot kiriting!");
return;
}

xarajatlar.push({nom,kategoriya,summa,sana});

chiqar();

}
function chiqar(){

let royxat=document.getElementById("royxat");
royxat.innerHTML="";

let jami=0;

xarajatlar.forEach(function(x,index){

jami+=x.summa;

let li=document.createElement("li");

li.innerHTML=
"📂 "+x.kategoriya+
"<br>📝 "+x.nom+
"<br>💵 "+x.summa+
"<br>📅 "+x.sana+
'<br><button onclick="ochir('+index+')">🗑️ Oʻchirish</button>';

royxat.appendChild(li);

});

document.getElementById("jami").innerHTML="📊 Jami: "+jami+" soʻm";

let daromad=Number(document.getElementById("daromad").value);

let qolgan=daromad-jami;

document.getElementById("natija").innerHTML="💰 Qolgan: "+qolgan+" soʻm";

}

function ochir(index){

xarajatlar.splice(index,1);

chiqar();

}

function qidir(){

let text=document.getElementById("qidiruv").value.toLowerCase();

document.querySelectorAll("#royxat li").forEach(function(item){

item.style.display=item.innerText.toLowerCase().includes(text)?"block":"none";

});

}
